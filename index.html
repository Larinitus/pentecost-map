<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendees Map</title>
  <style>
    body { margin: 20px; text-align: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #wrap { width: 800px; height: 800px; position: relative; margin: auto; }
    #base { width: 800px; height: 800px; display: block; user-select: none; -webkit-user-drag: none; }
    #pins { position: absolute; inset: 0; }
    .pin {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.85;
    }
    .tooltip {
      position: absolute;
      padding: 6px 8px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      transform: translate(10px, -10px);
      display: none;
      white-space: nowrap;
    }
    /* make it responsive-ish */
    @media (max-width: 850px) {
      #wrap { width: 100%; height: auto; }
      #base { width: 100%; height: auto; }
      #pins { position: absolute; inset: 0; }
    }
  </style>
</head>
<body>
  <h2>The Church Is the People of God</h2>

  <div id="wrap">
    <img id="base" src="baltimore-map-test.jpg" alt="Map" />
    <div id="pins"></div>
    <div id="tip" class="tooltip"></div>
  </div>

  <script>
    console.log("Loading JSONP from:", script.src);

    window.handlePoints = function(payload) {
      console.log("handlePoints payload:", payload);
      // existing code...
    };
    // 1) Set your church colors here
    const churchColors = {
      "The Foundry": "#e11d48",
      "Gallery Church": "#2563eb",
      "Grace Life Church": "#16a34a",
      "St Moses Church": "#008080",
      // ...
    };

    const pinsEl = document.getElementById("pins");
    const tipEl = document.getElementById("tip");
    const baseImg = document.getElementById("base");

    let latestPoints = [];

  function showTip(text, x, y) {
    tipEl.textContent = text;
    tipEl.style.left = x + "px";
    tipEl.style.top = y + "px";
    tipEl.style.display = "block";
  }
  function hideTip() { tipEl.style.display = "none"; }

  function clearPins() { pinsEl.innerHTML = ""; }

  function render(points) {
    clearPins();

    const rect = baseImg.getBoundingClientRect();
    if (!rect.width || !rect.height) {
      // Image not laid out yet; try again shortly.
      setTimeout(() => render(points), 50);
      return;
    }

    const scaleX = rect.width / 800;
    const scaleY = rect.height / 800;

    points.forEach(p => {
      const pin = document.createElement("div");
      pin.className = "pin";
      pin.style.left = (p.x * scaleX) + "px";
      pin.style.top  = (p.y * scaleY) + "px";
      pin.style.background = churchColors[p.church] || "#666";

      pin.addEventListener("mousemove", (ev) => {
        const pinsRect = pinsEl.getBoundingClientRect();
        showTip(p.church, ev.clientX - pinsRect.left, ev.clientY - pinsRect.top);
      });
      pin.addEventListener("mouseleave", hideTip);

      pinsEl.appendChild(pin);
    });
  }

  function renderLatest() {
    render(latestPoints);
  }
    
    // Re-render if the browser resizes (responsive layout changes scaling)
    window.addEventListener("resize", () => renderLatest());

    
    // JSONP callback
  window.handlePoints = function(payload) {
    console.log("handlePoints payload length:", Array.isArray(payload) ? payload.length : payload);
    latestPoints = Array.isArray(payload) ? payload : [];
    // If image is already loaded, render now; otherwise render after load.
    if (baseImg.complete) renderLatest();
    else baseImg.addEventListener("load", renderLatest, { once: true });
  };

    // 3) Load the JSONP feed
    // TODO: paste your Apps Script /exec URL here:
    const APPS_SCRIPT_BASE = "https://script.google.com/macros/s/AKfycbwrFB76M-w6pcP_H2C0HGyIQk_ksssC3AasGyPU854tP2DN7CdOe_iWAYOEibfNVVRGZA/exec";

    const script = document.createElement("script");
    script.src = APPS_SCRIPT_BASE + "?mode=data&callback=handlePoints&_=" + Date.now();
    document.head.appendChild(script);

    // Optional: refresh button behavior could be added later; for now refresh page.
  </script>
</body>
</html>
