<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.js"></script>
  <title>Attendees Map</title>
  <style>
    
    body { 
      margin: 0; 
      padding: 20px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #layout {
      display: grid;
      gap: 24px;
      justify-content: center;
      grid-template-columns: 1fr;
      width: min(800px, 100%);
      height: min(850px, calc(100vh - 40px));
      position: relative;
      margin: auto;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .marker {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 0.85;
    }
    #loading { position: absolute; inset: 0; z-index: 4; display: flex; align-items: center; justify-content: center;
      background:rgba(255,255,255,0.6); font-weight:600; }

    #refreshDotsContainer {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 5;
      width: 260px;
      max-width: 45%;
      border-radius: 8px;
    }
    #refreshDots {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      color: #ffffff;
      background-color: #8a1d19;
      box-shadow: 0 10px 14px rgba(0,0,0,0.18);
      opacity: 0.9;
      border-radius: 6px;
      cursor: pointer;
      align-self: center; 
      transition: background-color 0.2s ease, transform 0.05s ease;
    }
    #refreshDots:hover {
      background-color: #641c18;
    }
    #refreshDots:active {
      transform: translateY(1px);
    }
    #refreshDots:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    #legendPanel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 5;
      width: 260px;
      max-width: 45%;
      background: rgba(255,255,255,0.95);
      opacity: 0.8;
      border-radius: 8px;
      box-shadow: 0 10px 14px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    #legendToggle {
      width: 100%;
      padding: 12px 14px;
      border: none;
      background: #ffffff;
      opacity: 0.8;
      color: #000000;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #legendToggle:hover {
      background: #e3e3e3;
    }
    #legendArrow {
      font-size: 12px;
    }
    #legendContent {
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(0,0,0,0.08);
      max-height: 320px;
      overflow-y: auto;
    }
    #legend {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      text-align: left;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: inherit;
    }
    .legend-item:hover {
      background-color: rgba(0,0,0,0.05);
    }
    .legend-item.active {
      background-color: rgba(0,0,0,0.1);
      font-weight: 600;
    }
    .legend-swatch {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 8px;
      opacity: 0.85;
    }

    @media (max-width: 850px) {
      #layout { height: calc(100vh - 40px); }
    }
    @media (max-width: 480px) {
      #refreshDotsContainer {
        right: 2%;
        top: 8px;
        max-width: 47%;
      }
      #refreshDots {
        padding: 8px 10px;
        font-size: 11px;
      }
      #legendPanel {
        left: 2%;
        top: 8px;
        max-width: 47%;
      }
      #legendToggle {
        padding: 8px 10px;
        font-size: 11px;
      }
      #legendContent {
        max-height: 240px;
      }
    }
  
  </style>
</head>
<body>
  <div id="layout">
        <div id="map"></div>
        <div id="loading">Loading dots…</div>
        <div id="legendPanel">
          <button id="legendToggle" type="button" aria-expanded="false" aria-controls="legendContent">
            Filter <span id="legendArrow">▼</span>
          </button>
          <div id="legendContent" hidden>
            <div id="legend" aria-label="Church legend"></div>
          </div>
        </div>
        <div id="refreshDotsContainer">
          <button id="refreshDots" type="button">Refresh Dots</button>
        </div>
  </div>

  <script>

    mapboxgl.accessToken = 'pk.eyJ1IjoibGFycnlsaW4iLCJhIjoiY21vazV1YzNkMDBhZDJwcTRldW91MmlmMSJ9.Ci1giJgze5RhDtknQ_Ii2g';

    const map = new mapboxgl.Map({
      container: "map",
      style: 'mapbox://styles/larrylin/cmokbouga002601s71epn9phy', 
      center: [-76.62, 39.3], // lng, lat
      zoom: 10.5,
      minZoom: 10.5,
      maxZoom: 10.5,
      dragRotate: false,
      pitchWithRotate: false,
      attributionControl: true
    });

    map.scrollZoom.disable();
    map.doubleClickZoom.disable();
    map.touchZoomRotate.disable();
    map.boxZoom.disable();
    map.keyboard.disable();

    map.setMaxBounds([
      [-76.91, 39.09], // southwest [lng, lat]
      [-76.31, 39.49]  // northeast [lng, lat]
    ]);

    // Set church colors here.
    const churchColors = {
      "Central Presbyterian Church": "#FFC107",     // golden yellow
      "Church of the Resurrection": "#E91E63", // magenta
      "City Harbor Church": "#00C2A8",        // teal
      "East Baltimore Deliverance Center": "#228B22", // green
      "The Foundry": "#0084FF",              // strong blue
      "Gallery Church": "#FF2D55",           // vivid pink-red
      "Grace Beyond the Walls": "#7CFC00",   // bright lime
      "GraceCity Church": "#00BCD4",        // cyan
      "Grace Life Church": "#FF6A00",        // orange
      "Hopeville": "#5856D6",                // indigo
      "Horizon Church": "#1E40AF",           // deep navy blue
      "New Harvest Ministries": "#FF3B30",   // red
      "Sowebo Community Church": "#FF9500",  // amber
      "St Moses Church": "#BF5AF2",          // violet
      "Victory House Worship Center": "#32D74B" // green
    };

    const loadingEl = document.getElementById("loading");
    const legendEl = document.getElementById("legend");
    let activeMarkers = [];
    document.getElementById("refreshDots").addEventListener("click", loadPoints);

    const legendToggle = document.getElementById("legendToggle");
    const legendContent = document.getElementById("legendContent");
    const legendArrow = document.getElementById("legendArrow");

    legendToggle.addEventListener("click", () => {
      const isOpen = !legendContent.hidden;
      legendContent.hidden = isOpen;
      legendToggle.setAttribute("aria-expanded", String(!isOpen));
      legendArrow.textContent = isOpen ? "▼" : "▲";
    });

    function renderLegend() {
      if (!legendEl) return;
    
      // Sort alphabetically; remove this if you prefer a custom order
      const entries = Object.entries(churchColors)
        .sort(([a], [b]) => a.localeCompare(b));
    
      const showAllButton = `<button class="legend-item active" data-church="all">
        <span class="legend-swatch" style="background: gray;"></span>
        <span>Show All</span>
      </button>`;
      
      const churchButtons = entries.map(([name, color]) => `
        <button class="legend-item" data-church="${name}">
          <span class="legend-swatch" style="background:${color}"></span>
          <span>${name}</span>
        </button>
      `).join("");
      
      legendEl.innerHTML = showAllButton + churchButtons;
      
      legendEl.querySelectorAll('.legend-item').forEach(button => {
        button.addEventListener('click', (e) => {
          e.preventDefault();
          const selectedChurch = button.getAttribute('data-church');
          setActiveFilter(selectedChurch);
        });
      });
    }

    renderLegend();

    function setLoading(isLoading) {
      if (!loadingEl) return;
      loadingEl.style.display = isLoading ? "flex" : "none";
    }

    let latestPoints = [];
    let activeFilter = 'all';

    function setActiveFilter(church) {
      activeFilter = church;
      
      legendEl.querySelectorAll('.legend-item').forEach(button => {
        button.classList.remove('active');
        if (button.getAttribute('data-church') === church) {
          button.classList.add('active');
        }
      });
      renderLatest();
    }

    function clearDots() {
      activeMarkers.forEach(marker => marker.remove());
      activeMarkers = [];
    }
  
    function render(points) {
      clearDots();
  
      const filteredPoints = activeFilter === 'all' ? points : points.filter(p => p.church === activeFilter);

      filteredPoints.forEach(p => {
        const el = document.createElement("div");
        el.className = "marker";
        el.style.backgroundColor = churchColors[p.church] || "#666";
        const popupContent = document.createElement("div");
        const churchName = document.createElement("strong");
        churchName.textContent = p.church;
        popupContent.appendChild(churchName);

        const popup = new mapboxgl.Popup({
          closeButton: false,
          closeOnClick: false,
          offset: 12
        }).setDOMContent(popupContent);

        const marker = new mapboxgl.Marker(el)
          .setLngLat([p.lng, p.lat])
          .addTo(map);

        el.addEventListener("mouseenter", () => {
          popup.setLngLat([p.lng, p.lat]).addTo(map);
        });

        el.addEventListener("mouseleave", () => {
          popup.remove();
        });

        activeMarkers.push(marker);
      });
    }
  
    function renderLatest() {
      render(latestPoints);
    }
  
    const POINTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8vB-6T8KKEibKoEJuLbibJCxuIFBZXdZO63zSrCqT_0-aXJK06uvLhl7IlRHW39La6Tg7IVQBFVus/pub?gid=821555786&single=true&output=csv";
    
    function loadPoints() {
      setLoading(true);
    
      const url = POINTS_URL + "&_=" + Date.now();
    
      fetch(url, { cache: "no-store" })
        .then(r => r.text())
        .then(csv => {
          const rows = csv.trim().split("\n");
          rows.shift(); // header
    
          const points = rows
            .map(row => row.split(","))
            .filter(([church, lat, lng]) => church && lat && lng && !isNaN(lat) && !isNaN(lng))
            .map(([church, lat, lng]) => ({
              church,
              lat: Number(lat),
              lng: Number(lng)
            }));
          
          latestPoints = points;
    
          renderLatest();
    
          setLoading(false);
        })
        .catch(err => {
          console.error("Failed to load points:", err);
          setLoading(false);
        });
    }
    
    map.on("load", loadPoints);

  </script>
</body>
</html>
