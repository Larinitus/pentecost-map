<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Attendees Map</title>
  <style>
    
    body { 
      margin: 0; 
      padding: 20px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #layout {
      display: grid;
      gap: 24px;
      justify-content: center;
      grid-template-columns: 1fr;
      width: 800px; height: 800px; position: relative; margin: auto; 
    }
    #base { width: 800px; height: 800px; display: block; position: relative; z-index: 1; user-select: none; -webkit-user-drag: none; }
    #dots { position: absolute; inset: 0; z-index: 2; }
    #loading { position: absolute; inset: 0; z-index: 4; display: flex; align-items: center; justify-content: center;
      background:rgba(255,255,255,0.6); font-weight:600; }

    .dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.85;
    }
    
    #refreshDotsContainer {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 5;
      width: 260px;
      max-width: 45%;
      border-radius: 8px;
    }
    #refreshDots {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      color: #ffffff;
      background-color: #8a1d19;
      box-shadow: 0 10px 14px rgba(0,0,0,0.18);
      opacity: 0.9;
      border-radius: 6px;
      cursor: pointer;
      align-self: center; 
      transition: background-color 0.2s ease, transform 0.05s ease;
    }
    #refreshDots:hover {
      background-color: #641c18;
    }
    #refreshDots:active {
      transform: translateY(1px);
    }
    #refreshDots:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    #legendPanel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 5;
      width: 260px;
      max-width: 45%;
      background: rgba(255,255,255,0.95);
      opacity: 0.8;
      border-radius: 8px;
      box-shadow: 0 10px 14px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    #legendToggle {
      width: 100%;
      padding: 12px 14px;
      border: none;
      background: #ffffff;
      opacity: 0.8;
      color: #000000;
      font-size: 14px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #legendToggle:hover {
      background: #e3e3e3;
    }
    #legendArrow {
      font-size: 12px;
    }
    #legendContent {
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(0,0,0,0.08);
      max-height: 320px;
      overflow-y: auto;
    }
    #legend {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      text-align: left;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 10px;
      opacity: 0.85;
    }


    @media (max-width: 850px) {
      #wrap { width: 100%; height: auto; }
      #base { width: 100%; height: auto; }
      #dots { position: absolute; inset: 0; }
    }
    @media (max-width: 480px) {
      #refreshDotsContainer {
        right: 2%;
        top: 8px;
        max-width: 47%;
      }
      #refreshDots {
        padding: 8px 10px;
        font-size: 11px;
      }
      #legendPanel {
        left: 2%;
        top: 8px;
        max-width: 47%;
      }
      #legendToggle {
        padding: 8px 10px;
        font-size: 11px;
      }
      #legendContent {
        max-height: 240px;
      }
    }
    
  
  </style>
</head>
<body>
  <div id="layout">
        <img id="base" src="baltimore-map-800-w-regions-grayscale.png" alt="Map" />
        <div id="dots"></div>
        <div id="loading">Loading dots…</div>
        <div id="legendPanel">
          <button id="legendToggle" type="button" aria-expanded="false" aria-controls="legendContent">
            See Legend <span id="legendArrow">▼</span>
          </button>
          <div id="legendContent" hidden>
            <div id="legend" aria-label="Church legend"></div>
          </div>
        </div>
        <div id="refreshDotsContainer">
          <button id="refreshDots" type="button">Refresh Dots</button>
        </div>
  </div>

  <script>

    // set church colors here
    const churchColors = {
      "City Harbor Church": "#00C2A8",        // teal
      "The Foundry": "#0084FF",              // strong blue
      "Gallery Church": "#FF2D55",           // vivid pink-red
      "Grace Beyond the Walls": "#7CFC00",   // bright lime
      "Grace Life Church": "#FF6A00",        // orange
      "Hopeville": "#5856D6",                // indigo
      "Horizon Church": "#AF52DE",           // purple
      "New Harvest Ministries": "#FF3B30",   // red
      "Sowebo Community Church": "#FF9500",  // amber
      "St Moses Church": "#BF5AF2",          // violet
      "Victory House Worship Center": "#32D74B" // green
    };

    const dotsEl = document.getElementById("dots");
    const tipEl = document.getElementById("tip");
    const baseImg = document.getElementById("base");
    const loadingEl = document.getElementById("loading");
    const legendEl = document.getElementById("legend");
    document.getElementById("refreshDots").addEventListener("click", loadPoints);

    const legendToggle = document.getElementById("legendToggle");
    const legendContent = document.getElementById("legendContent");
    const legendArrow = document.getElementById("legendArrow");

    legendToggle.addEventListener("click", () => {
      const isOpen = !legendContent.hidden;
      legendContent.hidden = isOpen;
      legendToggle.setAttribute("aria-expanded", String(!isOpen));
      legendArrow.textContent = isOpen ? "▼" : "▲";
    });

    function renderLegend() {
      if (!legendEl) return;
    
      // Sort alphabetically; remove this if you prefer a custom order
      const entries = Object.entries(churchColors)
        .sort(([a], [b]) => a.localeCompare(b));
    
      legendEl.innerHTML = entries.map(([name, color]) => `
        <div class="legend-item">
          <span class="legend-swatch" style="background:${color}"></span>
          <span>${name}</span>
        </div>
      `).join("");
    }

    renderLegend();

    function setLoading(isLoading) {
      if (!loadingEl) return;
      loadingEl.style.display = isLoading ? "flex" : "none";
    }

    let latestPoints = [];

    function showTip(church, region, x, y) {
      tipEl.innerHTML = church + "<br>" + region;
      tipEl.style.left = x + "px";
      tipEl.style.top = y + "px";
      tipEl.style.display = "block";
    }
    function hideTip() { tipEl.style.display = "none"; }
  
    function clearDots() { dotsEl.innerHTML = ""; }
  
    function render(points) {
      clearDots();
  
      const rect = baseImg.getBoundingClientRect();
      if (!rect.width || !rect.height) {
        // Image not laid out yet; try again shortly.
        setTimeout(() => render(points), 50);
        return;
      }
  
      const scaleX = rect.width / 800;
      const scaleY = rect.height / 800;
  
      points.forEach(p => {
        const dot = document.createElement("div");
        dot.className = "dot";
        dot.style.left = (p.x * scaleX) + "px";
        dot.style.top  = (p.y * scaleY) + "px";
        dot.style.background = churchColors[p.church] || "#666";
  
        dot.addEventListener("mousemove", (ev) => {
          const dotsRect = dotsEl.getBoundingClientRect();
          showTip(p.church, p.region, ev.clientX - dotsRect.left, ev.clientY - dotsRect.top);
        });
        dot.addEventListener("mouseleave", hideTip);
  
        dotsEl.appendChild(dot);
      });
    }
  
    function renderLatest() {
      render(latestPoints);
    }
      
    window.addEventListener("resize", () => renderLatest());
  
    // Load points via Cloudflare Worker
    const POINTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8vB-6T8KKEibKoEJuLbibJCxuIFBZXdZO63zSrCqT_0-aXJK06uvLhl7IlRHW39La6Tg7IVQBFVus/pub?gid=596352563&single=true&output=csv";
    
    function loadPoints() {
      setLoading(true);
    
      const url = POINTS_URL + (POINTS_URL.includes("?") ? "&" : "?") + "_=" + Date.now();
    
      fetch(url, { cache: "no-store" })
        .then(r => r.text())
        .then(csv => {
          const rows = csv.trim().split("\n");
          rows.shift(); // header
    
          const points = rows
            .map(row => row.split(","))
            .filter(([church, region, x, y]) => church && region && x && y && !isNaN(x) && !isNaN(y))
            .map(([church, region, x, y]) => ({ church, region, x: Number(x), y: Number(y) }));
    
          latestPoints = points;
    
          if (baseImg.complete) renderLatest();
          else baseImg.addEventListener("load", renderLatest, { once: true });
    
          setLoading(false);
        })
        .catch(err => {
          console.error("Failed to load points:", err);
          setLoading(false);
        });
    }
    
    loadPoints();

  </script>
</body>
</html>
